# Java Maven CircleCI 2.0 configuration file
#
# Check https://circleci.com/docs/2.0/language-java/ for more details
#
version: 2.1

executors:
  java-image:
    working_directory: ~/repo
    environment:
      JAVA_TOOL_OPTIONS: -Xmx1024m
    docker:
      - image: ${JFROG_DOCKER_HOST}/tmc-private-images/java17
        auth:
          username: ${JFROG_USERNAME}
          password: ${JFROG_TOKEN}
  snapshot-publisher-image:
    working_directory: ~/repo
    environment:
      JAVA_TOOL_OPTIONS: -Xmx1024m
    docker:
      - image: ${JFROG_DOCKER_HOST}/tmc-private-images/java17
        auth:
          username: ${JFROG_USERNAME}
          password: ${JFROG_TOKEN}
  gitleaks-image:
    working_directory: ~/repo
    docker:
      - image: ${JFROG_DOCKER_HOST}/tmc-private-images/gitleaks
        auth:
          username: ${JFROG_USERNAME}
          password: ${JFROG_TOKEN}
jobs:
  scan_secrets:
    executor: gitleaks-image
    steps:
      - checkout
      - run: gitleaks
  build:
    executor: snapshot-publisher-image
    steps:
    - checkout
    - run: mvn clean
    # Download and cache dependencies
    - restore_cache:
        keys:
        - v3-dependencies-{{ checksum "pom.xml" }}-{{ checksum "tmc-oss-license/pom.xml" }}-{{ checksum "tmc-oss-parent/pom.xml" }}
    - run: |
        mvn dependency:go-offline -Pford-supplier-jfrog-artifactory-tmc-oss
        mvn package -Pford-supplier-jfrog-artifactory-tmc-oss
    - save_cache:
        paths:
        - ~/.m2
        key: v3-dependencies-{{ checksum "pom.xml" }}-{{ checksum "tmc-oss-license/pom.xml" }}-{{ checksum "tmc-oss-parent/pom.xml" }}
    - persist_to_workspace:
        root: /root
        paths:
          - repo
          - .m2

  #publish artifact to OSS repo cloudsmith-autonomic-au-tmc-oss
  publish-public:
    executor: java-image
    steps:
      - attach_workspace:
          at: /root
      - run: mvn versions:set -DnewVersion=${CIRCLE_TAG}
      - run:
          name: Publish to tmc-oss-root-pom
          command: |
            mvn deploy \
              -Pcloudsmith-autonomic-au-tmc-oss \
              -DaltDeploymentRepository="cloudsmith-autonomic-au-tmc-oss::https://maven.cloudsmith.io/autonomic/au-tmc-oss" \
              -DskipTests
  publish-public-jfrog:
    executor: snapshot-publisher-image
    steps:
      - attach_workspace:
          at: /root
      - run: mvn versions:set -DnewVersion=${CIRCLE_TAG}
      - run:
          name: Publish to tmc-oss-root-pom
          command: |
            mvn deploy \
              -Pford-supplier-jfrog-artifactory-tmc-oss \
              -DaltDeploymentRepository="ford-supplier-jfrog-artifactory-tmc-oss::${JFROG_URL}/${JFROG_REPO_TMC_OSS}" \
              -DskipTests

  private-snapshot-jfrog-dependency-track:
    executor: snapshot-publisher-image
    working_directory: /root/repo
    steps:
      - attach_workspace:
          at: /root
      - run:
          name: set new version
          command: mvn versions:set -DnewVersion=LATEST-SNAPSHOT
      - run:
          name: Publish tmc-oss-root-pom-private to au-tmc-snapshots
          command: /root/publish.sh publish_snapshot
      - run:
          name: Run FOSSA Analysis
          command: |
            fossa analyze \
              --with-telemetry-scope off \
              --endpoint "https://ford.fossa.com/" \
              --project "${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}" \
              --team "TMC-50844" \
              --policy "Website/Hosted Service Use" \
              --branch "<<pipeline.git.branch>>" \
              --revision "<<pipeline.git.revision>>" \
              --project-url "<<pipeline.project.git_url>>" \
              --project-label "team:telemetry-data" \
              --json
      - run:
          name: Fail build if FOSSA issues
          command: fossa test --with-telemetry-scope off  --endpoint "https://ford.fossa.com/"  --project "${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}"

  dependency-track:
    executor: snapshot-publisher-image
    steps:
      - attach_workspace:
          at: /root
      - run:
          name: Install FOSSA CLI
          command: |
            curl -H 'Cache-Control: no-cache' https://raw.githubusercontent.com/fossas/fossa-cli/master/install-latest.sh | bash
      - run: mvn versions:set -DnewVersion=${CIRCLE_TAG}
      - run:
          name: Upload to Dependency Track
          command: mvn install
      - run:
          name: Run FOSSA Analysis
          command: |
            fossa analyze \
              --with-telemetry-scope off \
              --endpoint "https://ford.fossa.com/" \
              --project "${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}" \
              --team "TMC-50844" \
              --policy "Website/Hosted Service Use" \
              --branch "main" \
              --revision "<<pipeline.git.revision>>" \
              --project-url "<<pipeline.project.git_url>>" \
              --project-label "team:telemetry-data" \
              --json
      - run:
          name: Fail build if FOSSA issues
          command: fossa test --with-telemetry-scope off  --endpoint "https://ford.fossa.com/"  --project "${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}"

  push-to-public:
    executor: snapshot-publisher-image
    steps:
      - checkout
      - run:
          name: Push to public repo
          command: /root/publish.sh push_public tmc-oss-root-pom ${CIRCLE_BRANCH} ${CIRCLE_BRANCH}

workflows:
  version: 2
  build_and_test:
    jobs:
    - scan_secrets:
        context:
            - tmc-cloudsmith-context
            - ford-supplier-jfrog-context
    - build:
        context:
            - tmc-cloudsmith-context
            - ford-supplier-jfrog-context
        requires:
          - scan_secrets
    - private-snapshot-jfrog-dependency-track:
        context:
          - tmc-cloudsmith-context
          - tmc-oss-context
          - ford-supplier-jfrog-context
        requires:
          - build
        filters:
          branches:
            only: rc
    - push-to-public:
        context:
          - tmc-cloudsmith-context
          - tmc-oss-context
          - ford-supplier-jfrog-context
        requires:
          - build
        filters:
          branches:
            only:
              - main
              - /release\/.*/
  release:
    jobs:
      - scan_secrets:
          context:
            - tmc-cloudsmith-context
            - ford-supplier-jfrog-context
          filters:
            tags:
              only: /.*/
            branches:
              ignore: /.*/
      - build:
          filters:
            tags:
              only: /.*/
            branches:
              ignore: /.*/    
          requires:
            - scan_secrets
          context:
            - tmc-cloudsmith-context
            - ford-supplier-jfrog-context
    #Run Publish on GitHub release
      - publish-public:
          context:
            - tmc-cloudsmith-context
            - tmc-oss-context
            - ford-supplier-jfrog-context
          requires:
            - build
          filters:
            tags:
              only: /.*/
            branches:
              ignore: /.*/
      - publish-public-jfrog:
          context:
            - tmc-cloudsmith-context
            - tmc-oss-context
            - ford-supplier-jfrog-context
          requires:
            - build
          filters:
            tags:
              only: /.*/
            branches:
              ignore: /.*/
      - dependency-track:
          context:
            - tmc-cloudsmith-context
            - tmc-oss-context
            - ford-supplier-jfrog-context
          requires:
            - build
          filters:
            tags:
              only: /.*/
            branches:
              ignore: /.*/
